name: Titan Crawler Worker

on:
  schedule:
    # Run every 20 minutes, 24/7
    - cron: '*/20 * * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  crawl:
    name: Run Autonomous Crawler
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run Titan Worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/titan-worker.js
